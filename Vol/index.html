<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voltixa Store</title>

<link rel="icon" type="image/png" href="img/logo/Voltixa-logo.png">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>⚡ Voltixa</h1>
    <input type="text" id="search" placeholder="Search products...">
    <div>Cart (<span id="cart-count">0</span>)</div>
</header>

<!-- Products (Image HTML me hai) -->
<section class="products" id="product-list">

    <div class="product" data-name="LED Bulb" data-price="100">
        <img src="img/led.jpg">
        <h3>LED Bulb</h3>
        <p>₹100</p>
        <button onclick="addToCart(this)">Add</button>
    </div>

    <div class="product" data-name="Electric Board" data-price="250">
        <img src="img/electric-board.jpg">
        <h3>Switch Board</h3>
        <p>₹250</p>
        <button onclick="addToCart(this)">Add</button>
    </div>

    <div class="product" data-name="Electric Wire" data-price="500">
        <img src="img/wire.jpg">
        <h3>Electric Wire</h3>
        <p>₹500</p>
        <button onclick="addToCart(this)">Add</button>
    </div>

    <div class="product" data-name="Fan" data-price="1500">
        <img src="img/fan.jpg">
        <h3>Fan</h3>
        <p>₹1500</p>
        <button onclick="addToCart(this)">Add</button>
    </div>

    <div class="product" data-name="Extention Board" data-price="1500">
        <img src="img/extention-board.jpg">
        <h3>Extention Board</h3>
        <p>₹800</p>
        <button onclick="addToCart(this)">Add</button>
    </div>

</section>

<!-- Cart -->
<section class="cart">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
</section>

<script src="js/script.js"></script>
</body>
</html>
